<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiszki App - Start</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <button id="menuToggle" class="menu-toggle" aria-label="Otwórz menu" aria-expanded="false">☰</button>
    <div id="menuOverlay" class="menu-overlay"></div>
    <aside id="sideMenu" class="side-menu" aria-label="Menu boczne">
        <h2>Menu</h2>
        <nav class="side-menu-nav">
            <a href="/">🏠 Strona główna</a>
            <a href="javascript:history.back()">↩️ Wstecz</a>
        </nav>

        <div class="side-menu-section">
            <h3>🎨 Motyw</h3>
            <select id="themeSelector"></select>
        </div>
    </aside>

    <div class="container app-shell">
        <div class="hero">
            <p class="hero-badge">🚀 Nowoczesna nauka</p>
            <h1>Witaj w aplikacji Fiszki</h1>
            <p class="hero-subtitle">Wybierz kategorię i ucz się szybciej dzięki interaktywnym trybom.</p>
        </div>

        <div class="categories-grid" id="categoriesContainer"></div>
    </div>

    <script src="{{ url_for('static', filename='themes.js') }}"></script>
    <script src="{{ url_for('static', filename='menu.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/categories');
                const categories = await response.json();

                const container = document.getElementById('categoriesContainer');
                container.innerHTML = '';

                categories.forEach(category => {
                    const link = document.createElement('a');
                    link.href = `/category/${category.id}`;
                    link.className = 'card-link card-link--primary';
                    link.innerHTML = `<h2>${category.name}</h2><p>Przejdź do zestawów</p>`;
                    container.appendChild(link);
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        });
    </script>
</body>
</html>
