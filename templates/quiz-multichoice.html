<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quiz - Wielokrotny Wybór</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='quiz.css') }}">
</head>
<body>
    <button id="menuToggle" class="menu-toggle" aria-label="Otwórz menu" aria-expanded="false">☰</button>
    <div id="menuOverlay" class="menu-overlay"></div>
    <aside id="sideMenu" class="side-menu" aria-label="Menu boczne">
        <h2>Menu</h2>
        <nav class="side-menu-nav">
            <a href="/">🏠 Strona główna</a>
            <a href="javascript:history.back()">↩️ Wstecz</a>
        </nav>

        <div class="side-menu-section">
            <h3>🎨 Motyw</h3>
            <select id="themeSelector"></select>
        </div>
    </aside>

    <div class="container">
        <h1 id="page-title">Quiz - Wielokrotny Wybór</h1>
        <div id="quiz-container">
            <div id="question-container">
                <p id="country-question"></p>
            </div>
            <div id="answers-container">
            </div>
            <div id="result-container">
                <p id="result-message"></p>
            </div>
            <div id="score-container">
                <p>Wynik: <span id="score">0</span> / <span id="total-questions">0</span></p>
            </div>
            <div id="leaderboard-section" style="display: none;">
                <h2>Ranking</h2>
                <div class="leaderboard-form">
                    <input type="text" id="nickname-input" placeholder="Twoje imię lub pseudonim" maxlength="30" autocomplete="off">
                    <button id="save-score-btn">Zapisz wynik</button>
                </div>
                <p id="save-status"></p>
                <ol id="leaderboard-list"></ol>
            </div>
            <div class="controls">
                <a href="javascript:history.back()">Wróć</a>
            </div>
        </div>
    </div>
    <script>
        const category = '{{ category }}' || 'capitals';
    </script>
    <script src="{{ url_for('static', filename='themes.js') }}"></script>
    <script src="{{ url_for('static', filename='menu.js') }}"></script>
    <script src="{{ url_for('static', filename='quiz-multichoice.js') }}"></script>
</body>
</html>
