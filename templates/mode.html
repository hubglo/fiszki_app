<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ category_name }} - Wybierz tryb</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <button id="menuToggle" class="menu-toggle" aria-label="Otwórz menu" aria-expanded="false">☰</button>
    <div id="menuOverlay" class="menu-overlay"></div>
    <aside id="sideMenu" class="side-menu" aria-label="Menu boczne">
        <h2>Menu</h2>
        <nav class="side-menu-nav">
            <a href="/">🏠 Strona główna</a>
            <a href="javascript:history.back()">↩️ Wstecz</a>
        </nav>

        <div class="side-menu-section">
            <h3>🎨 Motyw</h3>
            <select id="themeSelector"></select>
        </div>
    </aside>

    <div class="container app-shell">
        <div class="hero">
            <p class="hero-badge">🧠 Wybór trybu</p>
            <h1>{{ category_name }}</h1>
            <p class="hero-subtitle">Dopasuj sposób nauki do swojego stylu.</p>
        </div>

        <div class="modes-grid">
            <a href="/flashcards/{{ data_key if data_key else category_id }}" class="card-link card-link--violet">
                <div class="card-icon">📚</div>
                <h2>Fiszki</h2>
                <p>Przeglądaj karty</p>
            </a>
            <a href="/quiz/{{ data_key if data_key else category_id }}" class="card-link card-link--rose">
                <div class="card-icon">✍️</div>
                <h2>Quiz</h2>
                <p>Wpisz odpowiedź</p>
            </a>
            <a href="/quiz-multichoice/{{ data_key if data_key else category_id }}" class="card-link card-link--cyan">
                <div class="card-icon">🔘</div>
                <h2>Quiz ABCD</h2>
                <p>Wybierz odpowiedź</p>
            </a>
        </div>

        <a href="javascript:history.back()" class="back-button">← Powrót</a>
    </div>

    <script src="{{ url_for('static', filename='themes.js') }}"></script>
    <script src="{{ url_for('static', filename='menu.js') }}"></script>
</body>
</html>
