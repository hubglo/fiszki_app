<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ category.name }} - Fiszki App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <button id="menuToggle" class="menu-toggle" aria-label="Otwórz menu" aria-expanded="false">☰</button>
    <div id="menuOverlay" class="menu-overlay"></div>
    <aside id="sideMenu" class="side-menu" aria-label="Menu boczne">
        <h2>Menu</h2>
        <nav class="side-menu-nav">
            <a href="/">🏠 Strona główna</a>
            <a href="javascript:history.back()">↩️ Wstecz</a>
        </nav>

        <div class="side-menu-section">
            <h3>🎨 Motyw</h3>
            <select id="themeSelector"></select>
        </div>
    </aside>

    <div class="container app-shell">
        <div class="hero">
            <p class="hero-badge">📂 Kategoria</p>
            <h1>{{ category.name }}</h1>
            <p class="hero-subtitle">Wybierz obszar i przejdź do trybów nauki.</p>
        </div>

        <div class="categories-grid">
            {% for subcategory in category.subcategories %}
            <a href="/category/{{ category.id }}/{{ subcategory.id }}" class="card-link card-link--secondary">
                <h2>{{ subcategory.name }}</h2>
                <p>Wybierz podkategorię</p>
            </a>
            {% endfor %}
        </div>

        <a href="/" class="back-button">← Powrót do głównego menu</a>
    </div>

    <script src="{{ url_for('static', filename='themes.js') }}"></script>
    <script src="{{ url_for('static', filename='menu.js') }}"></script>
</body>
</html>
